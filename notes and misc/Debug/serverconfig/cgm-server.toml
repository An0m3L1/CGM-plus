	#Range: 0.0 ~ 1.7976931348623157E308
	gunShotSoundDistance = 96.0
	#The maximum distance reloading can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	reloadSoundDistance = 16.0
	#The maximum distance switching weapons can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	switchSoundDistance = 8.0
	#The maximum distance throwing grenades can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	grenadeThrowSoundDistance = 8.0
	#The maximum distance pulling pins from grenades can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	grenadePinSoundDistance = 8.0
	#The maximum distance grenade bouncing can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	grenadeBounceSoundDistance = 24.0
	#The maximum distance impact sounds from projectiles can be heard by players.
	#Range: 0.0 ~ 32.0
	impactSoundDistance = 16.0
	#The maximum distance rocket explosions can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	rocketExplosionSoundDistance = 128.0
	#The maximum distance pipe grenade explosions can be heard by players.
	#Range: 0.0 ~ 1.7976931348623157E308
	pipeGrenadeExplosionSoundDistance = 128.0

